<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تحدي التفاحة الملكي 🍎</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-gold: #ffcc00;
            --neon-blue: #00f3ff;
            --win-green: #2ecc71;
            --3d-shadow: #b38f00;
            --bomb-red: #e74c3c;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* شريط النيون العلوي */
        .neon-bar {
            height: 4px;
            width: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--accent-gold), var(--neon-blue), transparent);
            background-size: 200% 100%;
            animation: moveNeon 3s linear infinite;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        @keyframes moveNeon {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .header { 
            height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
        }
        
        .sub-header { font-size: 0.75rem; color: var(--accent-gold); letter-spacing: 1px; margin-top: 4px; }

        #game-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            align-items: center; padding: 20px 0;
            background: radial-gradient(circle at center, #1a1f29 0%, #0b0e14 100%);
        }

        #game-board {
            display: flex; flex-direction: column-reverse; gap: 8px;
            width: 90vw; max-width: 320px;
        }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; opacity: 0.2; pointer-events: none; transition: 0.3s; }
        .row.active { opacity: 1; pointer-events: auto; transform: scale(1.02); }

        .brick {
            height: 45px; background: #2a2f3a;
            border-radius: 8px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: 1px solid #3d444d;
            box-shadow: 0 4px 0 #000; transition: all 0.1s;
            font-size: 1.2rem;
        }

        .brick:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        
        /* حالة التفاحة */
        .brick.correct { 
            background: var(--win-green) !important; 
            box-shadow: 0 4px 0 #1b7a43; 
            animation: pulse 0.5s; 
        }

        /* حالة القنبلة - تم التعديل لتكون ثابتة */
        .brick.wrong { 
            background: var(--bomb-red) !important; 
            box-shadow: 0 4px 0 #822a22; 
            animation: shake 0.3s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* منطقة الأزرار الـ 3D */
        .controls { 
            height: 110px; display: flex; gap: 15px; width: 100%; 
            justify-content: center; align-items: center; 
            background: #161b22; border-top: 2px solid var(--accent-gold);
            padding-bottom: 25px; flex-shrink: 0;
        }
        
        .btn-3d {
            position: relative; padding: 12px 20px; font-size: 0.9rem; font-weight: bold;
            color: black; background: var(--accent-gold); border: none; border-radius: 12px;
            box-shadow: 0 6px 0 var(--3d-shadow); cursor: pointer; transition: 0.1s;
            min-width: 130px; outline: none;
        }

        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--3d-shadow);
        }

        .btn-reset { background: #444; color: white; box-shadow: 0 6px 0 #222; }
        .btn-reset:active { box-shadow: 0 2px 0 #222; }

        /* شاشة القفل */
        #lock-screen {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 30px; border-radius: 20px;
            border: 1px solid var(--accent-gold); text-align: center; width: 85%;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }
        input { padding: 15px; margin: 15px 0; width: 100%; text-align: center; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color: var(--accent-gold); margin-bottom: 10px;">APPLE CHALLENGE 🍎</h2>
            <p style="color: #888; font-size: 0.8rem;">أدخل شفرة العبور</p>
            <input type="password" id="pass-input" placeholder="••••••">
            <button class="btn-3d" onclick="checkCode()" style="width: 100%;">دخول للمصنع</button>
        </div>
    </div>

    <div id="main-game" style="display:none; flex-direction: column; height: 100%;">
        <div class="neon-bar"></div>
        <div class="header">
            <div id="msg" style="color: white; font-weight: bold; font-size: 1.1rem;">6 تفاحات.. ويستحسن 4 🍎</div>
            <div class="sub-header">المستوى الحالي: <span id="lvl-num">1</span></div>
        </div>

        <div id="game-container">
            <div id="game-board"></div>
        </div>

        <div class="controls">
            <button class="btn-3d btn-reset" onclick="resetCurrentLevel()">تراجع 🔄</button>
            <button class="btn-3d" onclick="initGame()">جولة جديدة 🚩</button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const SECRET_CODE = "102075";
        const board = document.getElementById('game-board');
        const lvlDisplay = document.getElementById('lvl-num');
        const msgDisplay = document.getElementById('msg');
        const music = document.getElementById('bg-music');
        let currentRow = 0;
        const difficulty = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
        let levelData = [];

        function checkCode() {
            if (document.getElementById('pass-input').value === SECRET_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                music.volume = 0.2;
                music.play().catch(() => console.log("Music blocked by browser"));
                initGame();
            } else {
                alert("الباسورد خطأ!");
            }
        }

        function initGame() {
            board.innerHTML = ''; currentRow = 0; levelData = []; lvlDisplay.innerText = 1;
            msgDisplay.innerText = "6 تفاحات.. ويستحسن 4 🍎";
            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                let indices = [0, 1, 2, 3, 4];
                let wrongPos = indices.sort(() => Math.random() - 0.5).slice(0, difficulty[i]);
                levelData.push(wrongPos);
                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrickClick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
            document.getElementById('game-container').scrollTop = board.scrollHeight;
        }

        function handleBrickClick(r, c) {
            const brick = document.getElementById(`brick-${r}-${c}`);
            // منع الضغط على مربع تم اختياره مسبقاً
            if (brick.classList.contains('correct') || brick.classList.contains('wrong')) return;
            
            if (levelData[r].includes(c)) {
                // إذا اختار قنبلة: يظهر اللون الأحمر والقنبلة فقط ولا يعيد اللعبة
                brick.classList.add('wrong'); 
                brick.innerHTML = '💣';
                msgDisplay.innerText = "حاول مرة أخرى في نفس الدور! ⚠️";
            } else {
                // إذا اختار تفاحة: يظهر اللون الأخضر وينتقل للدور التالي
                brick.classList.add('correct'); 
                brick.innerHTML = '🍎';
                msgDisplay.innerText = "رائع! استمر.. 🍎";
                setTimeout(() => nextLevel(), 400);
            }
        }

        function nextLevel() {
            if (currentRow < 9) {
                document.getElementById(`row-${currentRow}`).classList.remove('active');
                currentRow++;
                document.getElementById(`row-${currentRow}`).classList.add('active');
                lvlDisplay.innerText = currentRow + 1;
                document.getElementById('game-container').scrollBy({ top: -55, behavior: 'smooth' });
            } else {
                msgDisplay.innerText = "🏆 فوز ملكي أسطوري!";
            }
        }

        function resetCurrentLevel() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { 
                b.classList.remove('wrong', 'correct'); 
                b.innerHTML = ''; 
            });
            msgDisplay.innerText = "تم مسح اختيارات الدور الحالي 🔄";
        }
    </script>
</body>
</html>
