<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APPLE HACK VIP 🍎</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-gold: #ffcc00;
            --neon-blue: #00f3ff;
            --win-green: #2ecc71;
            --3d-shadow: #b38f00;
            --bomb-red: #e74c3c;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        .neon-bar {
            height: 4px; width: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--accent-gold), var(--neon-blue), transparent);
            background-size: 200% 100%; animation: moveNeon 3s linear infinite;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        @keyframes moveNeon { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .header { 
            height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
        }
        
        .sub-header { font-size: 0.75rem; color: var(--accent-gold); margin-top: 4px; font-weight: bold; }

        #game-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            align-items: center; padding: 20px 0;
            background: radial-gradient(circle at center, #1a1f29 0%, #0b0e14 100%);
        }

        #game-board { display: flex; flex-direction: column-reverse; gap: 10px; width: 90vw; max-width: 320px; }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; opacity: 0.1; pointer-events: none; transition: 0.4s; }
        .row.active { opacity: 1; pointer-events: auto; transform: scale(1.02); }

        .brick {
            height: 48px; background: #2a2f3a; border-radius: 10px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: 1px solid #3d444d; box-shadow: 0 5px 0 #000; transition: all 0.1s; font-size: 1.3rem;
        }
        .brick:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .brick.correct { background: var(--win-green) !important; box-shadow: 0 5px 0 #1b7a43; animation: pulse 0.5s; }
        .brick.wrong { background: var(--bomb-red) !important; box-shadow: 0 5px 0 #822a22; animation: shake 0.3s; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .controls { 
            height: 110px; display: flex; gap: 15px; width: 100%; justify-content: center; align-items: center; 
            background: #161b22; border-top: 2px solid var(--accent-gold); padding-bottom: 25px; flex-shrink: 0;
        }
        
        .btn-3d {
            padding: 12px 20px; font-size: 0.95rem; font-weight: bold; color: black; background: var(--accent-gold);
            border: none; border-radius: 12px; box-shadow: 0 6px 0 var(--3d-shadow); cursor: pointer; transition: 0.1s; min-width: 130px;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--3d-shadow); }
        .btn-reset { background: #444; color: white; box-shadow: 0 6px 0 #222; }

        .overlay {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 35px; border-radius: 25px; border: 1px solid var(--accent-gold);
            text-align: center; width: 85%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 204, 0, 0.15);
        }
        input { padding: 15px; margin: 15px 0; width: 100%; text-align: center; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 1.1rem; outline: none; }
    </style>
</head>
<body>

    <div id="pass-screen" class="overlay">
        <div class="login-box">
            <h2 style="color: var(--accent-gold); margin-bottom: 15px;">SECURE LOGIN 🔐</h2>
            <input type="password" id="pass-input" placeholder="كلمة المرور">
            <button class="btn-3d" onclick="verifyPass()" style="width: 100%;">استمرار</button>
        </div>
    </div>

    <div id="id-screen" class="overlay" style="display: none;">
        <div class="login-box">
            <h2 style="color: var(--neon-blue); margin-bottom: 15px;">PLAYER ID 🆔</h2>
            <p style="color: #888; font-size: 0.85rem;">يجب أن يكون المعرف مسجلاً للدخول</p>
            <input type="text" id="id-input" placeholder="أدخل الـ ID الخاص بك">
            <button class="btn-3d" onclick="verifyID()" style="width: 100%; background: var(--neon-blue); box-shadow: 0 6px 0 #008ba3;">تفعيل النظام</button>
        </div>
    </div>

    <div id="main-game" style="display:none; flex-direction: column; height: 100%;">
        <div class="neon-bar"></div>
        <div class="header">
            <div id="msg" style="color: white; font-weight: bold; font-size: 1.1rem;">6 تفاحات.. ويستحسن 4 🍎</div>
            <div class="sub-header">المستخدم: <span id="display-id" style="color:var(--neon-blue)">---</span> | الدور: <span id="lvl-num">1</span></div>
        </div>
        <div id="game-container"><div id="game-board"></div></div>
        <div class="controls">
            <button class="btn-3d btn-reset" onclick="resetCurrentLevel()">تراجع 🔄</button>
            <button class="btn-3d" onclick="initGame()">جولة جديدة 🚩</button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Night_Walk/Ketsa_-_04_-_Intergalactic.mp3" type="audio/mpeg">
    </audio>

    <script>
        const MASTER_PASS = "102075";
        // المعرف الوحيد المسموح به حالياً
        const ALLOWED_IDS = ["13551996"]; 

        const music = document.getElementById('bg-music');
        let playerID = "";
        let currentRow = 0;
        let levelData = [];

        function verifyPass() {
            if (document.getElementById('pass-input').value === MASTER_PASS) {
                document.getElementById('pass-screen').style.display = 'none';
                document.getElementById('id-screen').style.display = 'flex';
            } else { alert("❌ كلمة المرور غير صحيحة"); }
        }

        function verifyID() {
            let inputID = document.getElementById('id-input').value;
            if (ALLOWED_IDS.includes(inputID)) {
                playerID = inputID;
                document.getElementById('display-id').innerText = playerID;
                document.getElementById('id-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                music.volume = 0.2; 
                music.play().catch(() => console.log("Music interaction required"));
                initGame();
            } else { alert("⚠️ الـ ID غير مسجل!"); }
        }

        function generateSmartBombs(rowIdx) {
            let indices = [0, 1, 2, 3, 4];
            let bombCount = (rowIdx < 4) ? 1 : (rowIdx < 7) ? 2 : 3;
            if (rowIdx > 0 && Math.random() > 0.4) {
                let prevBombs = levelData[rowIdx-1];
                let smartBombs = prevBombs.map(b => (b + (Math.random() > 0.5 ? 1 : 0) + 5) % 5);
                return smartBombs.slice(0, bombCount);
            }
            return indices.sort(() => Math.random() - 0.5).slice(0, bombCount);
        }

        function initGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = ''; currentRow = 0; levelData = [];
            document.getElementById('lvl-num').innerText = 1;
            document.getElementById('msg').innerText = "6 تفاحات.. ويستحسن 4 🍎";
            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                let bombs = generateSmartBombs(i);
                levelData.push(bombs);
                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrickClick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
            document.getElementById('game-container').scrollTop = board.scrollHeight;
        }

        function handleBrickClick(r, c) {
            const brick = document.getElementById(`brick-${r}-${c}`);
            if (brick.classList.contains('correct') || brick.classList.contains('wrong')) return;
            if (levelData[r].includes(c)) {
                brick.classList.add('wrong'); brick.innerHTML = '💣';
                document.getElementById('msg').innerText = "فخ ذكي! حاول مرة أخرى 🧠";
            } else {
                brick.classList.add('correct'); brick.innerHTML = '🍎';
                document.getElementById('msg').innerText = "توقع عبقري.. المستوى التالي";
                setTimeout(() => nextLevel(), 400);
            }
        }

        function nextLevel() {
            if (currentRow < 9) {
                document.getElementById(`row-${currentRow}`).classList.remove('active');
                currentRow++;
                document.getElementById(`row-${currentRow}`).classList.add('active');
                document.getElementById('lvl-num').innerText = currentRow + 1;
                document.getElementById('game-container').scrollBy({ top: -60, behavior: 'smooth' });
            } else {
                document.getElementById('msg').innerText = "🏆 فوز أسطوري مذهل!";
                document.getElementById('msg').style.color = "var(--win-green)";
            }
        }

        function resetCurrentLevel() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { b.classList.remove('wrong', 'correct'); b.innerHTML = ''; });
        }
    </script>
</body>
</html>
