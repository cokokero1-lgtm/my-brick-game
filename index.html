<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مغامرة الـ 10 أدوار</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --brick-main: #3a4452;
            --brick-side: #252d38;
            --accent: #58a6ff;
            --error: #e74c3c;
            --success: #2ecc71;
        }
        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: #161b22; padding: 30px; border-radius: 15px;
            border: 1px solid var(--accent); text-align: center;
        }
        input { padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; width: 80%; margin: 15px 0; }
        
        #main-game { display: none; width: 100%; flex-direction: column; align-items: center; height: 100%; }
        .header { padding: 10px; text-align: center; background: rgba(22, 27, 34, 0.9); width: 100%; border-bottom: 1px solid #30363d; }
        
        #game-board {
            display: flex; flex-direction: column-reverse; gap: 6px; padding: 10px;
            width: 85vw; max-width: 350px; 
            margin-top: 10px; /* سحب اللوحة لفوق */
        }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; opacity: 0.2; pointer-events: none; }
        .row.active { opacity: 1; pointer-events: auto; transform: scale(1.02); }
        
        .brick {
            height: 35px; background: var(--brick-main); border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 0 var(--brick-side); font-size: 1rem;
        }
        .brick.correct { background: var(--success) !important; box-shadow: 0 4px 0 #1e8449; }
        .brick.wrong { background: var(--error) !important; box-shadow: 0 4px 0 #922b21; }
        
        /* تعديل مكان الزراير عشان تظهر فوق */
        .controls { 
            padding: 20px; 
            display: flex; 
            gap: 10px; 
            width: 100%; 
            justify-content: center;
            background: var(--bg-color);
            position: relative;
            z-index: 100;
        }
        button { background: var(--accent); color: black; border: none; padding: 12px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-reset { background: #f39c12; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="color: var(--accent);">كود الدخول</h2>
            <input type="password" id="pass-input" placeholder="ادخل الباسورد">
            <br>
            <button onclick="checkCode()">دخول</button>
        </div>
    </div>

    <div id="main-game">
        <div class="header">
            <div id="msg" style="color: var(--accent); font-weight: bold; margin-bottom: 5px;">خاليك 6 اختيارات بكتير 🎯</div>
            <div style="font-size: 0.9rem;">المستوى: <span id="lvl-num">1</span> / 10</div>
        </div>

        <div id="game-board"></div>

        <div class="controls">
            <button class="btn-reset" onclick="resetCurrentLevel()">إعادة الدور 🔄</button>
            <button onclick="initGame()">من جديد 🚩</button>
        </div>
    </div>

    <script>
        const SECRET_CODE = "151994";
        const board = document.getElementById('game-board');
        const lvlDisplay = document.getElementById('lvl-num');
        const msgDisplay = document.getElementById('msg');
        let currentRow = 0;
        const difficulty = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
        let levelData = [];

        function checkCode() {
            if (document.getElementById('pass-input').value === SECRET_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                initGame();
            }
        }

        function initGame() {
            board.innerHTML = ''; currentRow = 0; levelData = []; lvlDisplay.innerText = 1;
            msgDisplay.innerText = "خاليك 6 اختيارات بكتير 🎯";
            for (let i = 0; i < 10; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row' + (i === 0 ? ' active' : '');
                rowDiv.id = `row-${i}`;
                let indices = [0, 1, 2, 3, 4];
                let wrongPos = indices.sort(() => Math.random() - 0.5).slice(0, difficulty[i]);
                levelData.push(wrongPos);
                for (let j = 0; j < 5; j++) {
                    const brick = document.createElement('div');
                    brick.className = 'brick';
                    brick.id = `brick-${i}-${j}`;
                    brick.onclick = () => handleBrickClick(i, j);
                    rowDiv.appendChild(brick);
                }
                board.appendChild(rowDiv);
            }
        }

        function handleBrickClick(r, c) {
            const brick = document.getElementById(`brick-${r}-${c}`);
            if (brick.classList.contains('correct') || brick.classList.contains('wrong')) return;
            if (levelData[r].includes(c)) {
                brick.classList.add('wrong'); brick.innerHTML = '✘';
            } else {
                brick.classList.add('correct'); brick.innerHTML = '💎';
                setTimeout(() => nextLevel(), 300);
            }
        }

        function nextLevel() {
            if (currentRow < 9) {
                document.getElementById(`row-${currentRow}`).classList.remove('active');
                currentRow++;
                document.getElementById(`row-${currentRow}`).classList.add('active');
                lvlDisplay.innerText = currentRow + 1;
            } else {
                msgDisplay.innerText = "🏆 مبروك! قفلت اللعبة!";
            }
        }

        function resetCurrentLevel() {
            const bricks = document.querySelectorAll(`#row-${currentRow} .brick`);
            bricks.forEach(b => { b.classList.remove('wrong', 'correct'); b.innerHTML = ''; });
        }
    </script>
</body>
</html>
